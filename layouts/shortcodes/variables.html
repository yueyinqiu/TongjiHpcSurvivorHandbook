{{- $varsParam := .Get "vars" | default "" -}}

<div id="hpc-config-root" 
     data-vars="{{ $varsParam }}" 
     style="background: #f8f9fa; padding: 1rem; border: 2px solid #007bff; border-radius: 8px; margin: 1.5rem 0; font-family: sans-serif;">
    <div style="font-weight: bold; margin-bottom: 10px; color: #007bff;">🛠️ 页面变量配置</div>
    <div id="vars-inputs" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;"></div>
</div>

<script>
(function() {
    const varConfig = {
        "hpc-user": { label: "超算用户名", default: "u13070" },
        "ssh-host": { label: "SSH Host 名称", default: "hpc" },
        "fake-user": { label: "个人隔离目录", default: "~/data/fakeuser" },
        "local-home": { label: "本地家目录", default: "%USERPROFILE%" }
    };

    function initHpcSystem() {
        const root = document.getElementById('hpc-config-root');
        if (!root) return;

        const activeVarsRaw = root.getAttribute('data-vars');
        const activeVars = activeVarsRaw ? activeVarsRaw.split(",").map(v => v.trim()) : [];

        const inputContainer = document.getElementById('vars-inputs');
        activeVars.forEach(key => {
            if (varConfig[key]) {
                const savedVal = localStorage.getItem('hpc-' + key) || varConfig[key].default;
                const div = document.createElement('div');
                div.innerHTML = `<label style="display:block;font-size:0.85rem;margin-bottom:4px;color:#666;">${varConfig[key].label}:</label>
                                 <input type="text" data-hpc-key="${key}" value="${savedVal}" 
                                 style="width:95%; padding:4px; border:1px solid #ccc; border-radius:4px;">`;
                inputContainer.appendChild(div);
                div.querySelector('input').addEventListener('input', (e) => updateHpcValue(key, e.target.value));
            }
        });

        // 延迟执行以确保主题的渲染器（如语法高亮）完成工作
        setTimeout(() => {
            markDynamicNodes(document.body);
            refreshAllDisplays();
        }, 100);
    }

    function markDynamicNodes(container) {
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while(node = walker.nextNode()) {
            if (node.textContent.includes('@@')) {
                // 向上寻找最合适的包裹容器（避开已经处理过的）
                let parent = node.parentElement;
                // 特殊处理：如果是在代码块里，我们需要标记 code 标签
                if (parent.tagName === 'SPAN' && parent.closest('code')) {
                    parent = parent.closest('code');
                }
                
                if (!parent.dataset.hpcOriginal && !['SCRIPT', 'STYLE', 'INPUT', 'TEXTAREA'].includes(parent.tagName)) {
                    parent.dataset.hpcOriginal = parent.innerHTML;
                    parent.classList.add('hpc-dynamic-node');
                }
            }
        }
    }

    function refreshAllDisplays() {
        document.querySelectorAll('.hpc-dynamic-node').forEach(node => {
            let content = node.dataset.hpcOriginal;
            // 检查当前节点是否属于代码块
            const isCode = node.tagName === 'CODE' || node.closest('pre');

            Object.keys(varConfig).forEach(key => {
                const val = localStorage.getItem('hpc-' + key) || varConfig[key].default;
                const reg = new RegExp('@@' + key + '@@', 'g');
                
                if (isCode) {
                    // 代码块内直接替换纯文本，不破坏 HTML 结构
                    content = content.replace(reg, val);
                } else {
                    // 普通文本加样式
                    const html = `<span style="color:#d63384;font-weight:bold;font-family:monospace;">${val}</span>`;
                    content = content.replace(reg, html);
                }
            });
            node.innerHTML = content;
        });
    }

    function updateHpcValue(key, val) {
        localStorage.setItem('hpc-' + key, val);
        refreshAllDisplays();
    }

    if (document.readyState === 'complete') initHpcSystem();
    else window.addEventListener('load', initHpcSystem);
})();
</script>
